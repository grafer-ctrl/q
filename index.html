<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analisa Teknikal RSI & Golden Cross</title>
  <style>
    :root {
      --bg-color: #0b0c10;
      --card-bg: #15161b;
      --text-main: #ffffff;
      --text-muted: #888888;
      --mt-green: #00bc3f;
      --chart-bg: #000000;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Courier New', Courier, monospace, sans-serif;
      padding: 20px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 800px;
      background-color: var(--card-bg);
      border: 1px solid #333;
      border-radius: 4px;
      padding: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    header {
      margin-bottom: 15px;
      border-bottom: 1px dashed #444;
      padding-bottom: 10px;
    }

    h1 {
      font-size: 1.3rem;
      color: var(--mt-green);
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 5px;
    }

    .status-badge {
      font-weight: bold;
    }

    .status-live {
      color: #00ff00;
    }

    .status-demo {
      color: #ffaa00;
    }

    .chart-container {
      position: relative;
      background-color: var(--chart-bg);
      border: 2px solid #222;
      margin-bottom: 20px;
      width: 100%;
      height: 520px;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .button-container {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: space-between;
      margin-top: 10px;
    }

    .btn-mql {
      background-color: #ffffff;
      color: #000000;
      border: 3px solid #000000;
      font-weight: 900;
      font-size: 13px;
      padding: 8px 15px;
      cursor: pointer;
      text-transform: uppercase;
      flex: 1;
      min-width: 120px;
      text-align: center;
      transition: all 0.15s ease-in-out;
    }

    .btn-mql:hover {
      background-color: var(--mt-green);
      color: #ffffff;
    }

    .btn-mql.active {
      background-color: var(--mt-green);
      color: #ffffff;
    }

    .signal-box {
      background: #20222a;
      border-left: 4px solid var(--mt-green);
      padding: 10px;
      margin-bottom: 15px;
      font-size: 0.9rem;
    }

    .signal-text {
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>MQL4 Technical Suite</h1>
      <div class="status-bar">
        <div>Asset: <span id="current-asset" style="color: #fff;">EUR/USD</span> (<span id="current-tf">H1</span>)</div>
        <div>Sumber Data: <span id="data-status" class="status-badge status-live">Menghubungkan...</span></div>
      </div>
    </header>

    <div class="signal-box">
      <span>Status Tren Terakhir: </span>
      <span id="signal-state" class="signal-text">Memproses...</span>
    </div>

    <div class="chart-container">
      <canvas id="forexChart"></canvas>
    </div>

    <div class="button-container">
      <button id="btn-eur" class="btn-mql active" onclick="changeSymbol('EUR/USD')">EUR/USD</button>
      <button id="btn-gbp" class="btn-mql" onclick="changeSymbol('GBP/USD')">GBP/USD</button>
      <button id="btn-tf" class="btn-mql" onclick="toggleTimeframe()">H1</button>
      <button id="btn-refresh" class="btn-mql" onclick="fetchData()">REFRES API</button>
    </div>
  </div>

  <script>
    const apiKey = '68c36795a75a4b9c99e8ea500b7e5937';
    let currentSymbol = 'EUR/USD';
    let currentInterval = '1h'; // default mapping dari H1
    let rawCandles = [];
    
    // Timeframe rotasi
    const timeframes = [
      { display: 'H1', value: '1h' },
      { display: 'H4', value: '4h' },
      { display: 'D1', value: '1day' },
      { display: 'M15', value: '15min' },
      { display: 'M30', value: '30min' }
    ];
    let currentTfIndex = 0;

    // Parameter Teknis
    const InpBandsPeriod = 20;
    const InpBandsDeviations = 2.0;
    const FastPeriod = 5;
    const MediumPeriod = 8;
    const SlowPeriod = 13;
    const InpRSIPeriod = 14;

    function changeSymbol(symbol) {
      currentSymbol = symbol;
      document.getElementById('btn-eur').classList.toggle('active', symbol === 'EUR/USD');
      document.getElementById('btn-gbp').classList.toggle('active', symbol === 'GBP/USD');
      document.getElementById('current-asset').innerText = symbol;
      fetchData();
    }

    function toggleTimeframe() {
      currentTfIndex = (currentTfIndex + 1) % timeframes.length;
      const tf = timeframes[currentTfIndex];
      currentInterval = tf.value;
      document.getElementById('btn-tf').innerText = tf.display;
      document.getElementById('current-tf').innerText = tf.display;
      fetchData();
    }

    // Fungsi Fetching Data
    async function fetchData() {
      const statusElement = document.getElementById('data-status');
      statusElement.className = 'status-badge';
      statusElement.innerText = 'Mengunduh...';
      
      const url = `https://api.twelvedata.com/time_series?symbol=${currentSymbol}&interval=${currentInterval}&apikey=${apiKey}&outputsize=150`;

      try {
        const response = await fetch(url);
        const json = await response.json();

        if (json.status === 'ok' && json.values) {
          // Konversi urutan data dari terlama ke terbaru
          rawCandles = json.values.map(d => ({
            time: d.datetime,
            open: parseFloat(d.open),
            high: parseFloat(d.high),
            low: parseFloat(d.low),
            close: parseFloat(d.close)
          })).reverse();

          statusElement.innerText = 'LIVE API';
          statusElement.classList.add('status-live');
          processAndDraw();
        } else {
          throw new Error(json.message || 'Pembatasan API / Error respons');
        }
      } catch (err) {
        console.warn('API error, beralih menggunakan data simulasi:', err.message);
        statusElement.innerText = 'DEMO DATA (Limit API)';
        statusElement.classList.add('status-demo');
        rawCandles = generateDemoData();
        processAndDraw();
      }
    }

    // Generator data simulasi apabila API Key mencapai batas limit
    function generateDemoData() {
      const data = [];
      let price = currentSymbol === 'EUR/USD' ? 1.08500 : 1.27200;
      let date = new Date();
      for (let i = 0; i < 150; i++) {
        const change = (Math.random() - 0.495) * 0.0016; 
        const open = price;
        const close = price + change;
        const high = Math.max(open, close) + Math.random() * 0.0006;
        const low = Math.min(open, close) - Math.random() * 0.0006;
        
        data.push({
          time: date.toISOString().replace('T', ' ').substring(0, 19),
          open, high, low, close
        });
        price = close;
        date.setHours(date.getHours() - 1);
      }
      return data.reverse();
    }

    // Perhitungan Indikator Teknis
    function calculateSMA(data, period) {
      const sma = [];
      for (let i = 0; i < data.length; i++) {
        if (i < period - 1) {
          sma.push(null);
        } else {
          const sum = data.slice(i - period + 1, i + 1).reduce((acc, val) => acc + val, 0);
          sma.push(sum / period);
        }
      }
      return sma;
    }

    function calculateEMA(data, period) {
      const ema = [];
      const k = 2 / (period + 1);
      let prevEma = null;

      for (let i = 0; i < data.length; i++) {
        if (data[i] === null) {
          ema.push(null);
          continue;
        }
        if (prevEma === null) {
          // Inisialisasi awal dengan SMA sederhana
          const validSegment = data.slice(Math.max(0, i - period + 1), i + 1).filter(v => v !== null);
          if (validSegment.length < period) {
            ema.push(null);
          } else {
            prevEma = validSegment.reduce((s, v) => s + v, 0) / period;
            ema.push(prevEma);
          }
        } else {
          const curEma = data[i] * k + prevEma * (1 - k);
          ema.push(curEma);
          prevEma = curEma;
        }
      }
      return ema;
    }

    function calculateBollingerBands(closes) {
      const middle = calculateSMA(closes, InpBandsPeriod);
      const upper = [];
      const lower = [];

      for (let i = 0; i < closes.length; i++) {
        if (middle[i] === null) {
          upper.push(null);
          lower.push(null);
        } else {
          const slice = closes.slice(i - InpBandsPeriod + 1, i + 1);
          const mean = middle[i];
          const variance = slice.reduce((sum, val) => sum + Math.pow(val - mean, 2), 0) / InpBandsPeriod;
          const stdDev = Math.sqrt(variance);
          upper.push(mean + InpBandsDeviations * stdDev);
          lower.push(mean - InpBandsDeviations * stdDev);
        }
      }
      return { middle, upper, lower };
    }

    function calculateRSI(closes, period = 14) {
      const rsi = new Array(closes.length).fill(null);
      if (closes.length <= period) return rsi;

      let avgGain = 0;
      let avgLoss = 0;

      // Nilai awal
      for (let i = 1; i <= period; i++) {
        const diff = closes[i] - closes[i - 1];
        if (diff > 0) avgGain += diff;
        else avgLoss -= diff;
      }
      avgGain /= period;
      avgLoss /= period;

      rsi[period] = avgLoss === 0 ? 100 : 100 - (100 / (1 + (avgGain / avgLoss)));

      for (let i = period + 1; i < closes.length; i++) {
        const diff = closes[i] - closes[i - 1];
        const gain = diff > 0 ? diff : 0;
        const loss = diff < 0 ? -diff : 0;

        avgGain = (avgGain * (period - 1) + gain) / period;
        avgLoss = (avgLoss * (period - 1) + loss) / period;

        rsi[i] = avgLoss === 0 ? 100 : 100 - (100 / (1 + (avgGain / avgLoss)));
      }
      return rsi;
    }

    function processAndDraw() {
      const closes = rawCandles.map(c => c.close);

      // 1. Bollinger Bands
      const bands = calculateBollingerBands(closes);

      // 2. Chart Utama EMA Golden Cross (EMA 5, 8, 13)
      const mainEma5 = calculateEMA(closes, FastPeriod);
      const mainEma8 = calculateEMA(closes, MediumPeriod);
      const mainEma13 = calculateEMA(closes, SlowPeriod);

      // Status tren Chart Utama
      const mainStates = [];
      for (let i = 0; i < closes.length; i++) {
        const e5 = mainEma5[i];
        const e8 = mainEma8[i];
        const e13 = mainEma13[i];
        if (e5 && e8 && e13) {
          if (e5 > e8 && e8 > e13) mainStates.push(1); // BUY
          else if (e5 < e8 && e8 < e13) mainStates.push(2); // SELL
          else mainStates.push(0); // NETRAL
        } else {
          mainStates.push(0);
        }
      }

      // 3. Subwindow RSI (Period 14)
      const rsiValues = calculateRSI(closes, InpRSIPeriod);

      // 4. Subwindow EMA Golden Cross pada RSI (EMA 5, 8, 13 dari RSI)
      const subEma5 = calculateEMA(rsiValues, FastPeriod);
      const subEma8 = calculateEMA(rsiValues, MediumPeriod);
      const subEma13 = calculateEMA(rsiValues, SlowPeriod);

      // Status tren Subwindow
      const subStates = [];
      for (let i = 0; i < closes.length; i++) {
        const se5 = subEma5[i];
        const se8 = subEma8[i];
        const se13 = subEma13[i];
        if (se5 && se8 && se13) {
          if (se5 > se8 && se8 > se13) subStates.push(1); // BUY
          else if (se5 < se8 && se8 < se13) subStates.push(2); // SELL
          else subStates.push(0); // NETRAL
        } else {
          subStates.push(0);
        }
      }

      // Tampilkan status sinyal tren pada kotak info di atas grafik
      const latestState = mainStates[mainStates.length - 1];
      const signalBox = document.getElementById('signal-state');
      if (latestState === 1) {
        signalBox.innerText = 'BUY (BULLISH) 🟢';
        signalBox.style.color = '#1e90ff';
      } else if (latestState === 2) {
        signalBox.innerText = 'SELL (BEARISH) 🔴';
        signalBox.style.color = '#ff1493';
      } else {
        signalBox.innerText = 'NETRAL (KONSOLIDASI) ⚪';
        signalBox.style.color = '#888888';
      }

      // Render Visualisasi ke Canvas
      drawChart(
        rawCandles,
        bands,
        { ema5: mainEma5, ema8: mainEma8, ema13: mainEma13 },
        mainStates,
        rsiValues,
        { ema5: subEma5, ema8: subEma8, ema13: subEma13 },
        subStates
      );
    }

    function drawChart(candles, bands, mainEmas, mainStates, rsi, subEmas, subStates) {
      const canvas = document.getElementById('forexChart');
      const ctx = canvas.getContext('2d');

      // Penyesuaian ukuran Resolusi Tinggi (DPI)
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.scale(dpr, dpr);

      const width = rect.width;
      const height = rect.height;

      // Hapus & Atur Background Hitam
      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, width, height);

      const paddingRight = 60;
      const paddingLeft = 10;
      const paddingTop = 30;
      const paddingBottom = 25;
      const gap = 15;

      const totalChartHeight = height - paddingTop - paddingBottom;
      const mainHeight = Math.floor(totalChartHeight * 0.65);
      const subHeight = totalChartHeight - mainHeight - gap;

      const chartYTop = paddingTop;
      const chartYBottom = paddingTop + mainHeight;
      const subYTop = chartYBottom + gap;
      const subYBottom = subYTop + subHeight;

      const plotWidth = width - paddingLeft - paddingRight;

      // Batasi lilin (candle) yang ditampilkan di layar (misal 70 lilin terakhir)
      const maxCandles = 70;
      const totalCandles = candles.length;
      const startIndex = Math.max(0, totalCandles - maxCandles);
      const visibleCount = totalCandles - startIndex;

      const candleWidth = plotWidth / visibleCount;
      const getX = (i) => paddingLeft + (i - startIndex) * candleWidth + candleWidth / 2;

      // 1. Gambar Garis Kisi Vertikal (Grid Waktu)
      ctx.strokeStyle = '#1d1d1d';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 4]);
      for (let i = startIndex; i < totalCandles; i++) {
        if ((i - startIndex) % 10 === 0) {
          const x = getX(i);
          ctx.beginPath();
          ctx.moveTo(x, chartYTop);
          ctx.lineTo(x, chartYBottom);
          ctx.moveTo(x, subYTop);
          ctx.lineTo(x, subYBottom);
          ctx.stroke();

          // Label waktu di bagian paling bawah
          ctx.fillStyle = '#888888';
          ctx.font = '10px monospace';
          ctx.textAlign = 'center';
          const t = candles[i].time;
          const timeStr = t.includes(' ') ? t.split(' ')[1].substring(0, 5) : t.substring(5, 10);
          ctx.fillText(timeStr, x, height - 5);
        }
      }
      ctx.setLineDash([]);

      // 2. Kalkulasi Batas Minimum & Maksimum Skala Grafik Utama
      let minPrice = Infinity;
      let maxPrice = -Infinity;
      for (let i = startIndex; i < totalCandles; i++) {
        const c = candles[i];
        if (c.low < minPrice) minPrice = c.low;
        if (c.high > maxPrice) maxPrice = c.high;
        if (bands.upper[i] && bands.upper[i] > maxPrice) maxPrice = bands.upper[i];
        if (bands.lower[i] && bands.lower[i] < minPrice) minPrice = bands.lower[i];
      }

      // Beri batas ruang atas & bawah (padding 5%)
      const priceRange = maxPrice - minPrice;
      minPrice -= priceRange * 0.05;
      maxPrice += priceRange * 0.05;

      const getMainY = (price) => chartYBottom - ((price - minPrice) / (maxPrice - minPrice)) * mainHeight;

      // Garis Kisi Horisontal (Skala Harga)
      ctx.strokeStyle = '#111111';
      ctx.setLineDash([2, 2]);
      const steps = 5;
      for (let s = 0; s <= steps; s++) {
        const p = minPrice + (priceRange * s) / steps;
        const y = getMainY(p);
        ctx.beginPath();
        ctx.moveTo(paddingLeft, y);
        ctx.lineTo(width - paddingRight, y);
        ctx.stroke();

        ctx.fillStyle = '#888888';
        ctx.font = '10px monospace';
        ctx.textAlign = 'left';
        ctx.fillText(p.toFixed(5), width - paddingRight + 5, y + 3);
      }
      ctx.setLineDash([]);

      // 3. Gambar Bollinger Bands (LightSeaGreen)
      ctx.strokeStyle = '#20B2AA';
      ctx.lineWidth = 1;
      
      // Upper Band
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      for (let i = startIndex; i < totalCandles; i++) {
        if (bands.upper[i]) {
          const x = getX(i);
          const y = getMainY(bands.upper[i]);
          if (i === startIndex || !bands.upper[i - 1]) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
      }
      ctx.stroke();

      // Lower Band
      ctx.beginPath();
      for (let i = startIndex; i < totalCandles; i++) {
        if (bands.lower[i]) {
          const x = getX(i);
          const y = getMainY(bands.lower[i]);
          if (i === startIndex || !bands.lower[i - 1]) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
      }
      ctx.stroke();
      ctx.setLineDash([]);

      // Middle Band (SMA)
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      for (let i = startIndex; i < totalCandles; i++) {
        if (bands.middle[i]) {
          const x = getX(i);
          const y = getMainY(bands.middle[i]);
          if (i === startIndex || !bands.middle[i - 1]) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
      }
      ctx.stroke();

      // 4. Gambar Candlestick MT4 Style
      for (let i = startIndex; i < totalCandles; i++) {
        const c = candles[i];
        const x = getX(i);
        const w = Math.max(1.5, candleWidth * 0.7);

        const yOpen = getMainY(c.open);
        const yClose = getMainY(c.close);
        const yHigh = getMainY(c.high);
        const yLow = getMainY(c.low);

        const isBullish = c.close >= c.open;
        ctx.strokeStyle = isBullish ? '#00ff00' : '#ffffff';
        ctx.lineWidth = 1.2;

        // Ekor Lilin
        ctx.beginPath();
        ctx.moveTo(x, yHigh);
        ctx.lineTo(x, yLow);
        ctx.stroke();

        // Badan Lilin
        if (isBullish) {
          // Bullish: Hollow Green
          ctx.fillStyle = '#000000';
          ctx.fillRect(x - w / 2, Math.min(yOpen, yClose), w, Math.abs(yOpen - yClose));
          ctx.strokeRect(x - w / 2, Math.min(yOpen, yClose), w, Math.abs(yOpen - yClose));
        } else {
          // Bearish: Solid White
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(x - w / 2, Math.min(yOpen, yClose), w, Math.abs(yOpen - yClose));
          ctx.strokeRect(x - w / 2, Math.min(yOpen, yClose), w, Math.abs(yOpen - yClose));
        }
      }

      // 5. Gambar Garis Tren EMA Golden Cross Utama (EMA 5, 8, 13)
      const drawMainEMA = (emaArray) => {
        for (let i = startIndex + 1; i < totalCandles; i++) {
          if (!emaArray[i - 1] || !emaArray[i]) continue;

          ctx.beginPath();
          ctx.moveTo(getX(i - 1), getMainY(emaArray[i - 1]));
          ctx.lineTo(getX(i), getMainY(emaArray[i]));

          // Deteksi status untuk menentukan segment warna
          const state = mainStates[i];
          if (state === 1) ctx.strokeStyle = '#1e90ff'; // DodgerBlue (BUY)
          else if (state === 2) ctx.strokeStyle = '#ff1493'; // DeepPink (SELL)
          else ctx.strokeStyle = '#808080'; // Gray (NEUTRAL)

          ctx.lineWidth = 2;
          ctx.stroke();
        }
      };
      drawMainEMA(mainEmas.ema5);
      drawMainEMA(mainEmas.ema8);
      drawMainEMA(mainEmas.ema13);

      // Label Chart Utama
      ctx.fillStyle = '#00ff00';
      ctx.font = 'bold 11px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText('CHART UTAMA', paddingLeft + 10, chartYTop + 15);

      // 6. Subwindow (Hanya Menampilkan Level 15, 50, dan 85)
      const getSubY = (val) => subYBottom - (val / 100) * subHeight;

      ctx.strokeStyle = '#555555';
      ctx.setLineDash([2, 2]);
      ctx.lineWidth = 1;
      const targetLevels = [15, 50, 85];
      targetLevels.forEach(lvl => {
        const y = getSubY(lvl);
        ctx.beginPath();
        ctx.moveTo(paddingLeft, y);
        ctx.lineTo(width - paddingRight, y);
        ctx.stroke();

        ctx.fillStyle = '#888888';
        ctx.font = '10px monospace';
        ctx.textAlign = 'left';
        ctx.fillText(lvl.toString(), width - paddingRight + 5, y + 3);
      });
      ctx.setLineDash([]);

      // Gambar EMA Kombinasi RSI di Subwindow (EMA 5, 8, 13 dari RSI)
      const drawSubEMA = (emaArray) => {
        for (let i = startIndex + 1; i < totalCandles; i++) {
          if (!emaArray[i - 1] || !emaArray[i]) continue;

          ctx.beginPath();
          ctx.moveTo(getX(i - 1), getSubY(emaArray[i - 1]));
          ctx.lineTo(getX(i), getSubY(emaArray[i]));

          const state = subStates[i];
          if (state === 1) ctx.strokeStyle = '#1e90ff'; // DodgerBlue
          else if (state === 2) ctx.strokeStyle = '#ff1493'; // DeepPink
          else ctx.strokeStyle = '#808080'; // Gray

          ctx.lineWidth = 2;
          ctx.stroke();
        }
      };
      drawSubEMA(subEmas.ema5);
      drawSubEMA(subEmas.ema8);
      drawSubEMA(subEmas.ema13);

      // Label Subwindow
      ctx.fillStyle = '#00ff00';
      ctx.font = 'bold 11px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText('WINDOW', paddingLeft + 10, subYTop + 15);

      // Garis Batas Antara Chart Utama & Subwindow
      ctx.strokeStyle = '#333333';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, chartYBottom + gap / 2);
      ctx.lineTo(width, chartYBottom + gap / 2);
      ctx.stroke();
    }

    // Penyesuaian saat resolusi ukuran layar berubah
    window.addEventListener('resize', () => {
      if (rawCandles.length > 0) processAndDraw();
    });

    // Jalankan inisialisasi pertama kali
    fetchData();
  </script>
</body>
</html>
