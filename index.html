<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Analisa Simple</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- TradingView Lightweight Charts CDN -->
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body {
            background-color: #ffffff;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body class="flex flex-col items-center p-4">

    <!-- Container Utama Sesuai Gambar (1 Kolom Sederhana) -->
    <div class="w-full max-w-[600px] flex flex-col gap-4">
        
        <!-- Area Grafik (Background Hitam) -->
        <div class="border-2 border-gray-300 rounded overflow-hidden bg-black relative">
            
            <!-- Loading indicator -->
            <div id="loading-overlay" class="absolute inset-0 bg-black/80 z-50 flex flex-col items-center justify-center gap-2 transition-opacity duration-300">
                <div class="w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                <div class="text-xs text-gray-400">Loading data...</div>
            </div>

            <!-- Grafik Utama (Candlesticks, EMAs, Bollinger Bands) -->
            <div id="main-chart" class="w-full h-[380px]"></div>
            
            <!-- Grafik Subwindow (Golden Cross & RSI Levels) -->
            <div id="sub-chart" class="w-full h-[220px] border-t border-gray-800"></div>
        </div>

        <!-- Baris Tombol Pertama -->
        <div class="flex gap-3">
            <button id="btn-eurusd" onclick="changePair('EUR/USD')" class="flex-1 py-3 border-[3px] border-blue-700 rounded text-blue-700 font-bold text-center text-xl bg-white leading-tight">
                eur/<br>usd
            </button>
            <button id="btn-gbpusd" onclick="changePair('GBP/USD')" class="flex-1 py-3 border-[3px] border-blue-700 rounded text-blue-700 font-bold text-center text-xl bg-white leading-tight">
                gbp/<br>usd
            </button>
            <button onclick="fetchChartData()" class="flex-[1.5] py-3 border-[3px] border-blue-700 rounded text-blue-700 font-bold text-center text-xl bg-white hover:bg-gray-100 transition">
                refress api
            </button>
        </div>

        <!-- Baris Tombol Kedua -->
        <div class="flex gap-3">
            <button id="btn-1h" onclick="changeTimeframe('1h')" class="flex-1 py-4 border-[3px] border-blue-700 rounded text-blue-700 font-bold text-center text-xl bg-white">
                h1
            </button>
            <button id="btn-4h" onclick="changeTimeframe('4h')" class="flex-1 py-4 border-[3px] border-blue-700 rounded text-blue-700 font-bold text-center text-xl bg-white">
                h4
            </button>
            <button id="btn-30m" onclick="changeTimeframe('30m')" class="flex-1 py-4 border-[3px] border-blue-700 rounded text-blue-700 font-bold text-center text-xl bg-white">
                m30
            </button>
        </div>

        <!-- Pesan Error (jika limit API tercapai) -->
        <div id="error-message" class="hidden text-center text-xs text-red-600 font-bold mt-2 bg-red-50 p-2 rounded border border-red-200">
            Koneksi API gagal. Mohon tunggu 1 menit sebelum me-refresh kembali.
        </div>
    </div>

    <!-- Script Logika dan Visualisasi Grafik -->
    <script>
        const API_KEY = "8cd5e84fa4564322b907aaddac29b059";
        let activePair = "EUR/USD";
        let activeInterval = "1h"; // Default H1

        let mainChart, subChart;
        let candlestickSeries;
        let upperBBSeries, lowerBBSeries;
        let ribbonSeriesList = [];
        let gcSeriesList = [];
        let rsiLevelDummy;

        const COLOR_BUY = "#1E90FF";     // Dodger Blue
        const COLOR_SELL = "#FF1493";    // Deep Pink
        const COLOR_NEUTRAL = "#808080"; // Grey

        document.addEventListener("DOMContentLoaded", () => {
            initCharts();
            fetchChartData();
        });

        function initCharts() {
            const mainContainer = document.getElementById("main-chart");
            const subContainer = document.getElementById("sub-chart");

            // Inisialisasi Grafik Utama
            mainChart = LightweightCharts.createChart(mainContainer, {
                width: mainContainer.clientWidth,
                height: mainContainer.clientHeight,
                layout: {
                    background: { type: 'solid', color: '#000000' },
                    textColor: '#ffffff',
                    fontSize: 10,
                },
                grid: {
                    vertLines: { color: 'rgba(42, 46, 57, 0.1)' },
                    horzLines: { color: 'rgba(42, 46, 57, 0.1)' },
                },
                rightPriceScale: {
                    borderColor: '#333333',
                    minimumWidth: 60,
                },
                timeScale: {
                    borderColor: '#333333',
                    timeVisible: true,
                },
            });

            // Lilin model MT4 Green on Black
            candlestickSeries = mainChart.addCandlestickSeries({
                upColor: '#00FF00',      // Bullish body: hijau padat
                downColor: '#000000',    // Bearish body: hitam
                borderUpColor: '#00FF00',
                borderDownColor: '#00FF00', // Garis tepi bearish: hijau
                wickUpColor: '#00FF00',
                wickDownColor: '#00FF00',
            });

            // Bollinger Bands (Upper & Lower)
            upperBBSeries = mainChart.addLineSeries({
                color: '#A9A9A9',
                lineWidth: 1,
                lineStyle: LightweightCharts.LineStyle.Dashed,
                priceLineVisible: false,
            });
            lowerBBSeries = mainChart.addLineSeries({
                color: '#A9A9A9',
                lineWidth: 1,
                lineStyle: LightweightCharts.LineStyle.Dashed,
                priceLineVisible: false,
            });

            // 6 EMA Grid Ribbon
            const periods = [10, 20, 30, 40, 50, 60];
            ribbonSeriesList = periods.map(() => {
                return mainChart.addLineSeries({
                    lineWidth: 2,
                    priceLineVisible: false,
                });
            });

            // Inisialisasi Grafik Subwindow (Bawah)
            subChart = LightweightCharts.createChart(subContainer, {
                width: subContainer.clientWidth,
                height: subContainer.clientHeight,
                layout: {
                    background: { type: 'solid', color: '#000000' },
                    textColor: '#ffffff',
                    fontSize: 10,
                },
                grid: {
                    vertLines: { color: 'rgba(42, 46, 57, 0.1)' },
                    horzLines: { color: 'rgba(42, 46, 57, 0.1)' },
                },
                rightPriceScale: {
                    borderColor: '#333333',
                    minimumWidth: 60,
                },
                leftPriceScale: {
                    borderColor: '#333333',
                    visible: true,
                },
                timeScale: {
                    borderColor: '#333333',
                    timeVisible: true,
                },
            });

            // EMA 5, 8, 13 di Subwindow
            const subPeriods = [5, 8, 13];
            gcSeriesList = subPeriods.map(() => {
                return subChart.addLineSeries({
                    priceScaleId: 'right',
                    lineWidth: 2,
                    priceLineVisible: false,
                });
            });

            // Skala Kiri Khusus RSI (Garis biru utama disembunyikan)
            rsiLevelDummy = subChart.addLineSeries({
                priceScaleId: 'left',
                visible: false, 
            });

            subChart.priceScale('left').applyOptions({
                autoScale: false,
                minPrice: 0,
                maxPrice: 100,
            });

            // Level RSI: 85, 50, 15
            rsiLevelDummy.createPriceLine({ price: 85, color: '#A9A9A9', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed, axisLabelVisible: true, title: '85' });
            rsiLevelDummy.createPriceLine({ price: 50, color: '#555555', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed, axisLabelVisible: true, title: '50' });
            rsiLevelDummy.createPriceLine({ price: 15, color: '#A9A9A9', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed, axisLabelVisible: true, title: '15' });

            // Sinkronisasi Zoom dan Pan antar grafik
            let isSyncing = false;
            mainChart.timeScale().subscribeVisibleTimeRangeChange(range => {
                if (isSyncing) return;
                isSyncing = true;
                subChart.timeScale().setVisibleRange(range);
                isSyncing = false;
            });
            subChart.timeScale().subscribeVisibleTimeRangeChange(range => {
                if (isSyncing) return;
                isSyncing = true;
                mainChart.timeScale().setVisibleRange(range);
                isSyncing = false;
            });

            // Resizing responsif
            window.addEventListener("resize", () => {
                mainChart.resize(mainContainer.clientWidth, mainContainer.clientHeight);
                subChart.resize(subContainer.clientWidth, subContainer.clientHeight);
            });
        }

        function changePair(pair) {
            activePair = pair;
            fetchChartData();
        }

        function changeTimeframe(tf) {
            activeInterval = tf;
            fetchChartData();
        }

        function updateButtonUI() {
            // Reset status semua tombol menjadi outline putih-biru
            const pairs = ['btn-eurusd', 'btn-gbpusd'];
            pairs.forEach(id => {
                document.getElementById(id).className = "flex-1 py-3 border-[3px] border-blue-700 rounded text-blue-700 font-bold text-center text-xl bg-white leading-tight";
            });

            const tfs = ['btn-1h', 'btn-4h', 'btn-30m'];
            tfs.forEach(id => {
                document.getElementById(id).className = "flex-1 py-4 border-[3px] border-blue-700 rounded text-blue-700 font-bold text-center text-xl bg-white";
            });

            // Aktifkan warna biru penuh untuk tombol terpilih
            const activePairId = activePair === "EUR/USD" ? 'btn-eurusd' : 'btn-gbpusd';
            document.getElementById(activePairId).className = "flex-1 py-3 border-[3px] border-blue-700 rounded text-white font-bold text-center text-xl bg-blue-700 leading-tight";

            const activeTfId = activeInterval === "1h" ? 'btn-1h' : activeInterval === "4h" ? 'btn-4h' : 'btn-30m';
            document.getElementById(activeTfId).className = "flex-1 py-4 border-[3px] border-blue-700 rounded text-white font-bold text-center text-xl bg-blue-700";
        }

        async function fetchChartData() {
            showLoading(true);
            hideError();
            updateButtonUI();

            const url = `https://api.twelvedata.com/time_series?symbol=${activePair}&interval=${activeInterval}&apikey=${API_KEY}&outputsize=100`;

            try {
                const response = await fetch(url);
                const result = await response.json();

                if (result.status !== "ok") {
                    throw new Error(result.message || "Gagal mendapatkan data.");
                }

                const rawValues = result.values.reverse();
                const data = rawValues.map(v => ({
                    time: parseDate(v.datetime),
                    open: parseFloat(v.open),
                    high: parseFloat(v.high),
                    low: parseFloat(v.low),
                    close: parseFloat(v.close)
                }));

                // Set Lilin ke chart
                candlestickSeries.setData(data);

                // Set Dummy RSI agar level garis terplot di subwindow
                rsiLevelDummy.setData(data.map(d => ({ time: d.time, value: 50 })));

                // 1. Hitung Bollinger Bands (20, 2)
                const bb = calculateBollingerBands(data, 20, 2);
                upperBBSeries.setData(bb.upper);
                lowerBBSeries.setData(bb.lower);

                // 2. Hitung & Plot Grid Ribbon 6 EMA (10, 20, 30, 40, 50, 60)
                const ribbonPeriods = [10, 20, 30, 40, 50, 60];
                ribbonPeriods.forEach((p, idx) => {
                    const ema = calculateEMA(data, p);
                    const plotData = [];

                    for (let i = 1; i < data.length; i++) {
                        if (ema[i] === null || ema[i-1] === null) continue;

                        let color = COLOR_NEUTRAL;
                        if (data[i].close > ema[i] && ema[i] > ema[i-1]) {
                            color = COLOR_BUY;
                        } else if (data[i].close < ema[i] && ema[i] < ema[i-1]) {
                            color = COLOR_SELL;
                        }

                        plotData.push({
                            time: data[i].time,
                            value: ema[i],
                            color: color
                        });
                    }
                    ribbonSeriesList[idx].setData(plotData);
                });

                // 3. Hitung & Plot Golden Cross Sub (5, 8, 13)
                const ema5 = calculateEMA(data, 5);
                const ema8 = calculateEMA(data, 8);
                const ema13 = calculateEMA(data, 13);

                const gc5 = [], gc8 = [], gc13 = [];

                for (let i = 1; i < data.length; i++) {
                    if (ema13[i] === null || ema13[i-1] === null) continue;

                    let color = COLOR_NEUTRAL;
                    if (ema5[i] > ema8[i] && ema8[i] > ema13[i]) {
                        color = COLOR_BUY;
                    } else if (ema5[i] < ema8[i] && ema8[i] < ema13[i]) {
                        color = COLOR_SELL;
                    }

                    gc5.push({ time: data[i].time, value: ema5[i], color: color });
                    gc8.push({ time: data[i].time, value: ema8[i], color: color });
                    gc13.push({ time: data[i].time, value: ema13[i], color: color });
                }

                gcSeriesList[0].setData(gc5);
                gcSeriesList[1].setData(gc8);
                gcSeriesList[2].setData(gc13);

                mainChart.timeScale().fitContent();

            } catch (err) {
                showError();
            } finally {
                showLoading(false);
            }
        }

        // Kalkulasi Bollinger Bands
        function calculateBollingerBands(data, period, multiplier) {
            const upper = [];
            const lower = [];

            for (let i = 0; i < data.length; i++) {
                if (i < period - 1) continue;

                let sum = 0;
                for (let j = i - period + 1; j <= i; j++) {
                    sum += data[j].close;
                }
                const sma = sum / period;

                let sumDiffSq = 0;
                for (let j = i - period + 1; j <= i; j++) {
                    sumDiffSq += Math.pow(data[j].close - sma, 2);
                }
                const stdDev = Math.sqrt(sumDiffSq / period);

                upper.push({ time: data[i].time, value: sma + (multiplier * stdDev) });
                lower.push({ time: data[i].time, value: sma - (multiplier * stdDev) });
            }
            return { upper, lower };
        }

        // Kalkulasi EMA
        function calculateEMA(data, period) {
            const ema = Array(data.length).fill(null);
            if (data.length < period) return ema;

            let sum = 0;
            for (let i = 0; i < period; i++) {
                sum += data[i].close;
            }
            let prevEma = sum / period;
            ema[period - 1] = prevEma;

            const multiplier = 2 / (period + 1);
            for (let i = period; i < data.length; i++) {
                const curEma = (data[i].close - prevEma) * multiplier + prevEma;
                ema[i] = curEma;
                prevEma = curEma;
            }
            return ema;
        }

        function parseDate(str) {
            const parts = str.split(' ');
            const dateParts = parts[0].split('-');
            const timeParts = parts[1].split(':');
            return Date.UTC(
                parseInt(dateParts[0]),
                parseInt(dateParts[1]) - 1,
                parseInt(dateParts[2]),
                parseInt(timeParts[0]),
                parseInt(timeParts[1]),
                parseInt(timeParts[2] || '0')
            ) / 1000;
        }

        function showLoading(visible) {
            document.getElementById("loading-overlay").style.display = visible ? "flex" : "none";
        }

        function showError() {
            document.getElementById("error-message").classList.remove("hidden");
        }

        function hideError() {
            document.getElementById("error-message").classList.add("hidden");
        }
    </script>
</body>
</html>
